<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .typewriter {
            color: white;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 2px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            /* Анімація триває 2 секунди, робить рівно 8 кроків і зупиняється на фіналі */
            animation: typing 2s steps(8) forwards;
        }

        /* Мерехтлива крапка-курсор */
        .typewriter::after {
            content: '.';
            animation: blink 0.8s infinite;
        }

        /* 8ch означає "ширина рівно у 8 символів" */
        @keyframes typing {
            from { width: 0; }
            to { width: 8ch; }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="typewriter">You cant</div>

</body>
</html>
