<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .typewriter {
            color: white;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 2px;
            /* Ефект друку: змінюємо ширину тексту від 0 до 100% */
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2s steps(9) forwards;
        }

        /* Замість риски робимо крапку-курсор, яка блимає */
        .typewriter::after {
            content: '.';
            animation: blink 0.8s infinite;
        }

        /* Анімація появи літер */
        @keyframes typing {
            from { width: 0; }
            to { width: 105px; } /* Точна ширина під фразу "You cant" */
        }

        /* Анімація блимання крапки */
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="typewriter">You cant</div>

</body>
</html>
